services:
  - type: web
    name: corridor-cricket
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: RENDER
        value: "true"
    disk:
      name: cricket-data
      mountPath: /data
      sizeGB: 1
